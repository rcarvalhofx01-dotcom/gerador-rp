<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Promoção</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="container">

<h1>🎖 Promoção</h1>

<p class="subtitulo">
Preencha apenas o necessário.
</p>

<div class="card">

<h2>👤 Instrutor</h2>

<label>Instrutor</label>
<input id="instrutor">

<label>Auxiliares</label>
<input id="auxiliares">

</div>

<div class="card">

<h2>✅ Aprovados</h2>

<textarea id="aprovados" rows="6"></textarea>

</div>

<div class="card">

<h2>❌ Reprovados</h2>

<textarea id="reprovados" rows="4"></textarea>

</div>

<div class="card">

<h2>📝 Observações</h2>

<textarea id="observacoes" rows="4"></textarea>

</div>

<button id="gerarBtn">

🎖 Gerar Relatório

</button>

<button id="copiarBtn">

📋 Copiar Relatório

</button>

<div class="card">

<h2>Resultado</h2>

<textarea id="resultado" rows="15" readonly></textarea>

</div>

<a class="botao-voltar" href="../index.html">

⬅ Voltar

</a>

<script src="../js/app.js"></script>

</div>

</body>

</html>
