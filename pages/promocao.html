<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Promoção</title>

    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="container">

    <h1>🎖 Relatório de Promoção</h1>

    <label>👤 Instrutor</label>
    <input type="text" id="instrutor">

    <label>👥 Auxiliares</label>
    <input type="text" id="auxiliares">

    <label>✅ Aprovados</label>
    <textarea id="aprovados" rows="6"></textarea>

    <label>❌ Reprovados</label>
    <textarea id="reprovados" rows="4"></textarea>

    <label>👀 Observações</label>
    <textarea id="observacoes" rows="3"></textarea>

    <button id="gerarBtn">
        Gerar Relatório
    </button>

    <button id="copiarBtn">
        Copiar Relatório
    </button>

    <textarea id="resultado" rows="15" readonly></textarea>

    <br><br>

    <a href="../index.html" class="botao">
        ⬅ Voltar
    </a>

</div>

<script src="../js/app.js"></script>

</body>
</html>
